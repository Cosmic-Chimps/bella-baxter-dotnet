name: Publish .NET SDK to NuGet

# Trigger: push a tag like v0.2.0 to bella-baxter-dotnet repo.
# release-sdk.yml in the monorepo creates this tag automatically.
# Version is extracted from the tag — no commit-back, no auto-bump.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set production API URL
        env:
          BELLA_BAXTER_API_URL: ${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}
        run: |
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . \
              --include='*.cs' \
              | xargs sed -i.bak "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
            find . -name "*.bak" -delete
          fi

      - name: Generate Kiota client
        run: |
          dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0
          kiota generate \
            --language CSharp \
            --class-name BellaClient \
            --namespace-name BellaBaxter.Client \
            --openapi openapi.json \
            --output BellaBaxter.Client/src/generated \
            --exclude-backward-compatible \
            --clean-output \
            --log-level Warning

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-manifest-update
        # macOS supports all MAUI targets except net10.0-windows (requires a Windows runner).
        # The BellaBaxter.Maui package is built with iOS/Android/macCatalyst targets only.

      - name: Restore & Build
        run: |
          dotnet restore
          # Build non-MAUI projects
          for csproj in \
            BellaBaxter.Client/BellaBaxter.Client.csproj \
            BellaBaxter.AspNet.Configuration/BellaBaxter.AspNet.Configuration.csproj \
            BellaBaxter.Aspire.Configuration/BellaBaxter.Aspire.Configuration.csproj \
            BellaBaxter.Aspire.Host/BellaBaxter.Aspire.Host.csproj \
            BellaBaxter.SourceGenerator/BellaBaxter.SourceGenerator.csproj; do
            dotnet build "$csproj" -c Release --no-restore
          done
          # Build MAUI with macOS-compatible targets only (net10.0-windows requires a Windows runner)
          dotnet build BellaBaxter.Maui/BellaBaxter.Maui.csproj -c Release --no-restore \
            /p:TargetFrameworks="net10.0-ios;net10.0-android;net10.0-maccatalyst"

      - name: Pack all publishable packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for csproj in \
            BellaBaxter.Client/BellaBaxter.Client.csproj \
            BellaBaxter.AspNet.Configuration/BellaBaxter.AspNet.Configuration.csproj \
            BellaBaxter.Aspire.Configuration/BellaBaxter.Aspire.Configuration.csproj \
            BellaBaxter.Aspire.Host/BellaBaxter.Aspire.Host.csproj \
            BellaBaxter.SourceGenerator/BellaBaxter.SourceGenerator.csproj; do
            dotnet pack "$csproj" -c Release --no-build \
              -p:Version="$VERSION" \
              -o ./nupkgs
          done
          # MAUI: pack macOS-compatible targets only
          dotnet pack BellaBaxter.Maui/BellaBaxter.Maui.csproj -c Release --no-build \
            /p:TargetFrameworks="net10.0-ios;net10.0-android;net10.0-maccatalyst" \
            -p:Version="$VERSION" \
            -o ./nupkgs

      - name: Push to NuGet.org
        run: |
          for nupkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$nupkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  notify:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK .NET publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
