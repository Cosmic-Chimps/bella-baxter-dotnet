name: Publish .NET SDK to NuGet

# Trigger: push a tag like v0.2.0 to bella-baxter-dotnet repo.
# release-sdk.yml in the monorepo creates this tag automatically.
# Version is extracted from the tag — no commit-back, no auto-bump.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set production API URL
        env:
          BELLA_BAXTER_API_URL: ${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}
        run: |
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . \
              --include='*.cs' \
              | xargs sed -i "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
          fi

      - name: Generate Kiota client
        run: |
          dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0
          kiota generate \
            --language CSharp \
            --class-name BellaClient \
            --namespace-name BellaBaxter.Client \
            --openapi openapi.json \
            --output BellaBaxter.Client/src/generated \
            --exclude-backward-compatible \
            --clean-output \
            --log-level Warning

      - name: Restore & Build
        run: dotnet restore && dotnet build -c Release --no-restore

      - name: Pack all publishable packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for csproj in \
            BellaBaxter.Client/BellaBaxter.Client.csproj \
            BellaBaxter.AspNet.Configuration/BellaBaxter.AspNet.Configuration.csproj \
            BellaBaxter.Aspire.Configuration/BellaBaxter.Aspire.Configuration.csproj \
            BellaBaxter.Aspire.Host/BellaBaxter.Aspire.Host.csproj \
            BellaBaxter.SourceGenerator/BellaBaxter.SourceGenerator.csproj; do
            dotnet pack "$csproj" -c Release --no-build \
              -p:Version="$VERSION" \
              -o ./nupkgs
          done

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

  notify:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*SDK .NET publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
